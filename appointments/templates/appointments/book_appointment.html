{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment — CodeCut</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f2f2f2;
            --text: #111111;
            --text-muted: #666666;
            --card-bg: rgba(0,0,0,0.03);
            --card-border: rgba(0,0,0,0.12);
            --input-bg: rgba(0,0,0,0.04);
            --input-border: rgba(0,0,0,0.15);
            --accent: #000000;
            --accent-text: #ffffff;
            --accent-hover: #333333;
        }

        html[data-theme="dark"] {
            --bg: #000000;
            --text: #f5f5f5;
            --text-muted: #999999;
            --card-bg: rgba(255,255,255,0.04);
            --card-border: rgba(255,255,255,0.14);
            --input-bg: rgba(255,255,255,0.06);
            --input-border: rgba(255,255,255,0.18);
            --accent: #ffffff;
            --accent-text: #000000;
            --accent-hover: #dddddd;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            min-height: 100vh;
            background-color: var(--bg);
            justify-content: center;
            align-items: center;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid var(--card-border);
            background-color: var(--card-bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }

        .theme-toggle svg { width: 20px; height: 20px; }

        .card {
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            padding: 40px 35px;
            background-color: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
        }

        h1 { color: var(--text); font-size: 24px; margin-bottom: 24px; }

        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; margin-bottom: 6px; color: var(--text-muted); }

        select, input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--input-border);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            background-color: var(--input-bg);
            color: var(--text);
        }

        select:focus, input:focus { outline: none; border-color: var(--accent); }

        select option {
            background-color: #ffffff;
            color: #111111;
        }

        button {
            width: 100%;
            padding: 13px;
            background-color: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.15s ease, background-color 0.15s ease;
        }

        button:hover { background-color: var(--accent-hover); transform: translateY(-2px); }

        .error-msg {
            background: #fdecea;
            color: #b3261e;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .back-link {
            display: block;
            margin-top: 16px;
            text-align: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
        }

        .back-link:hover { color: var(--text); }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="theme-toggle-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="theme-icon"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>

    <div class="card">
        <h1>Book an Appointment</h1>

        {% if messages %}
            {% for message in messages %}
                <div class="error-msg">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Service</label>
                {{ form.service }}
            </div>
            <div class="form-group">
                <label>Date</label>
                {{ form.appointment_date }}
            </div>
            <div class="form-group">
                <label>Time</label>
                {{ form.appointment_time }}
            </div>
            <button type="submit">Book Appointment</button>
        </form>

        <a href="{% url 'customer_dashboard' %}" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        const moonIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('theme-toggle-btn').innerHTML = isDark
                ? moonIcon
                : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="theme-icon"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
        }

        const dateInput = document.querySelector('input[name="appointment_date"]');
        const timeSelect = document.querySelector('select[name="appointment_time"]');
        const allOptions = Array.from(timeSelect.options).map(opt => ({ value: opt.value, text: opt.text }));

        function refreshAvailableSlots() {
            const selectedDate = dateInput.value;
            if (!selectedDate) return;

            fetch(`/api/booked-slots/?date=${selectedDate}`)
                .then(res => res.json())
                .then(data => {
                    const booked = data.booked;
                    timeSelect.innerHTML = '';
                    allOptions.forEach(opt => {
                        if (!booked.includes(opt.value)) {
                            const option = document.createElement('option');
                            option.value = opt.value;
                            option.text = opt.text;
                            timeSelect.appendChild(option);
                        }
                    });
                });
        }

        dateInput.addEventListener('change', refreshAvailableSlots);
    </script>

</body>
</html>
